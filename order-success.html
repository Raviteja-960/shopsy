<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopEasy | Order Placed!</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a th:href="@{/}" class="logo"><i class="fas fa-store"></i> ShopEasy</a>
    <div class="nav-links">
      <a th:href="@{/}"><i class="fas fa-home"></i> Home</a>
      <a th:href="@{/cart}" class="cart-link">
        <i class="fas fa-shopping-cart"></i> Cart
        <span class="cart-badge" th:text="${cartCount}">0</span>
      </a>
    </div>
  </div>
</nav>

<div class="success-overlay" style="display:flex; position:relative; min-height:80vh; background:none;">
  <div class="success-box">
    <div class="success-icon">🎉</div>
    <h2>Order Placed Successfully!</h2>
    <p>Thank you for your order. We'll deliver it soon!</p>
    <p class="order-id" th:if="${order != null}">
      Order ID: #<span th:text="${order.id}">0</span>
    </p>

    <!-- Order summary -->
    <div th:if="${order != null}" style="text-align:left; margin: 1rem 0; width:100%;">
      <p><strong>Name:</strong> <span th:text="${order.customerName}"></span></p>
      <p><strong>Phone:</strong> <span th:text="${order.customerPhone}"></span></p>
      <p><strong>City:</strong> <span th:text="${order.city}"></span></p>
      <p><strong>Payment:</strong> <span th:text="${order.paymentMethod}"></span></p>
      <p><strong>Total:</strong> ₹<span th:text="${#numbers.formatInteger(order.totalAmount, 1, 'COMMA')}"></span></p>
    </div>

    <a th:href="@{/}" class="btn-hero">Continue Shopping</a>
  </div>
</div>

<footer class="footer">
  <p>© 2025 ShopEasy — Built with Spring Boot ❤️</p>
</footer>
</body>
</html>
