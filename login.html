<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>ShopEasy | Login</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="login-body">
<div class="login-container">
  <div class="logo" style="font-size:1.5rem;margin-bottom:0.5rem;">🛒 ShopEasy</div>
  <h2>Welcome Back 👋</h2>
  <p>Login to continue shopping</p>

  <div class="form-alert error show" th:if="${error}" th:text="${error}"></div>
  <div class="form-alert success show" th:if="${success}" th:text="${success}"></div>
  <div class="form-alert show" th:if="${logout}" th:text="${logout}"></div>

  <form th:action="@{/login}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="email"    name="username" placeholder="Enter Email" required/>
    <input type="password" name="password" placeholder="Enter Password" required/>
    <button type="submit">Login</button>
  </form>

  <p class="login-footer">
    Don't have an account? <a th:href="@{/register}">Sign Up</a>
  </p>
  <p class="login-footer" style="font-size:0.75rem; color:#aaa; margin-top:0.5rem;">
    Demo: <strong>admin@shopeasy.com / admin123</strong> &nbsp;|&nbsp; <strong>user@shopeasy.com / user123</strong>
  </p>
</div>
</body>
</html>
