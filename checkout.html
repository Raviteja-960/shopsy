<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopEasy | Checkout</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a th:href="@{/}" class="logo"><i class="fas fa-store"></i> ShopEasy</a>
    <div class="nav-links">
      <a th:href="@{/}"><i class="fas fa-home"></i> Home</a>
      <a th:href="@{/cart}" class="cart-link">
        <i class="fas fa-shopping-cart"></i> Cart
        <span class="cart-badge" th:text="${cartCount}">0</span>
      </a>
    </div>
  </div>
</nav>

<div class="page-title">
  <h2><i class="fas fa-credit-card"></i> Checkout</h2>
  <p>Fill in your details to place the order</p>
</div>

<section class="checkout-section">

  <!-- LEFT: Form -->
  <div class="checkout-form-box">
    <h3><i class="fas fa-user"></i> Delivery Details</h3>

    <form th:action="@{/checkout/place}" method="post" th:object="${checkoutRequest}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <!-- Global errors -->
      <div class="form-alert error show" th:if="${#fields.hasErrors('*')}">
        <i class="fas fa-exclamation-circle"></i> Please fix the errors below.
      </div>

      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" th:field="*{customerName}" placeholder="e.g. Ravi Kumar"/>
        <span class="field-error" th:if="${#fields.hasErrors('customerName')}" th:errors="*{customerName}"></span>
      </div>
      <div class="form-group">
        <label>Phone Number *</label>
        <input type="tel" th:field="*{customerPhone}" placeholder="e.g. 9876543210" maxlength="10"/>
        <span class="field-error" th:if="${#fields.hasErrors('customerPhone')}" th:errors="*{customerPhone}"></span>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" th:field="*{customerEmail}" placeholder="e.g. ravi@email.com"/>
      </div>
      <div class="form-group">
        <label>Full Address *</label>
        <textarea th:field="*{address}" rows="3" placeholder="House No, Street, Area..."></textarea>
        <span class="field-error" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></span>
      </div>
      <div class="form-group">
        <label>City *</label>
        <input type="text" th:field="*{city}" placeholder="e.g. Chennai"/>
        <span class="field-error" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></span>
      </div>
      <div class="form-group">
        <label>Pincode *</label>
        <input type="text" th:field="*{pincode}" placeholder="e.g. 600001" maxlength="6"/>
        <span class="field-error" th:if="${#fields.hasErrors('pincode')}" th:errors="*{pincode}"></span>
      </div>
      <div class="form-group">
        <label>Payment Method</label>
        <select th:field="*{paymentMethod}">
          <option value="COD">Cash on Delivery (COD)</option>
          <option value="UPI">UPI Payment</option>
          <option value="Card">Debit/Credit Card</option>
        </select>
      </div>

      <button type="submit" class="btn-place-order">
        <i class="fas fa-check-circle"></i> Place Order
      </button>
    </form>
  </div>

  <!-- RIGHT: Order Summary -->
  <div class="checkout-summary-box">
    <h3><i class="fas fa-shopping-bag"></i> Order Items</h3>
    <div th:each="item : ${cartItems}" class="checkout-item">
      <img th:src="${item.image}" th:alt="${item.name}"
           onerror="this.src='https://via.placeholder.com/50'"/>
      <div class="checkout-item-info">
        <span th:text="${item.name}">Product</span>
        <small>Qty: <span th:text="${item.quantity}">1</span></small>
      </div>
      <span>₹<span th:text="${#numbers.formatInteger(item.subtotal, 1, 'COMMA')}">0</span></span>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-row">
      <span>Delivery</span><span class="free-tag">FREE</span>
    </div>
    <div class="summary-row total-row">
      <span>Total Amount</span>
      <span>₹<span th:text="${#numbers.formatInteger(cartTotal, 1, 'COMMA')}">0</span></span>
    </div>
  </div>

</section>

<footer class="footer">
  <p>© 2025 ShopEasy — Built with Spring Boot ❤️</p>
</footer>
</body>
</html>
