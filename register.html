<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>ShopEasy | Register</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="login-body">
<div class="login-container">
  <div class="logo" style="font-size:1.5rem;margin-bottom:0.5rem;">🛒 ShopEasy</div>
  <h2>Create Account</h2>
  <p>Join ShopEasy today</p>

  <div class="form-alert error show" th:if="${error}" th:text="${error}"></div>

  <form th:action="@{/register}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="email"    name="email"    placeholder="Enter Email"    required/>
    <input type="password" name="password" placeholder="Enter Password" required/>
    <button type="submit">Create Account</button>
  </form>

  <p class="login-footer">Already have an account? <a th:href="@{/login}">Login</a></p>
</div>
</body>
</html>
